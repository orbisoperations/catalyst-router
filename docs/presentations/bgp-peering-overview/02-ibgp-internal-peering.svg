<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="islandA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1929;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#061018;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="islandB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0c29;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#100618;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="islandC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2920;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#061812;stop-opacity:0.95"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr2Blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arr2Purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arr2Green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arr2Cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">iBGP — Islands Sharing Intelligence</text>
  <text x="550" y="60" text-anchor="middle" fill="#64748b" font-size="12">V2: Each autonomous node maintains LOCAL + INTERNAL routes only. Full table sync on connect, delta propagation at runtime.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND A (Left)                                 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="90" width="310" height="520" rx="18" fill="url(#islandA)" stroke="#3b82f6" stroke-width="2.5" filter="url(#sh2)"/>
  <rect x="38" y="98" width="294" height="504" rx="14" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Island A Label -->
  <rect x="45" y="105" width="130" height="30" rx="6" fill="#0c1929" stroke="#1d4ed8" stroke-width="1"/>
  <text x="55" y="125" fill="#3b82f6" font-size="12" font-weight="800">NODE A</text>

  <!-- A: OrchestratorBus -->
  <rect x="50" y="150" width="270" height="55" rx="10" fill="#1e1045" stroke="#7c3aed" stroke-width="1"/>
  <text x="185" y="173" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">OrchestratorBus</text>
  <text x="185" y="193" text-anchor="middle" fill="#8b5cf6" font-size="9">Plan → Commit → Notify</text>

  <!-- A: RIB -->
  <rect x="50" y="220" width="270" height="220" rx="10" fill="#0a0f1a" stroke="#4c1d95" stroke-width="1"/>
  <text x="185" y="244" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">Route Table (RIB)</text>

  <!-- A: LOCAL -->
  <rect x="62" y="258" width="246" height="65" rx="6" fill="#1e3a8a" opacity="0.4" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="72" y="275" fill="#93c5fd" font-size="10" font-weight="700">LOCAL</text>
  <text x="72" y="293" fill="#94a3b8" font-size="9">users-api     http:graphql  :8081</text>
  <text x="72" y="308" fill="#94a3b8" font-size="9">payments-api  http:grpc     :8082</text>

  <!-- A: INTERNAL -->
  <rect x="62" y="330" width="246" height="100" rx="6" fill="#052e16" opacity="0.4" stroke="#22c55e" stroke-width="0.5"/>
  <text x="72" y="347" fill="#6ee7b7" font-size="10" font-weight="700">INTERNAL (learned via iBGP)</text>
  <text x="72" y="365" fill="#94a3b8" font-size="9">orders-api    via Node-B  path:[B]</text>
  <text x="72" y="381" fill="#94a3b8" font-size="9">billing-svc   via Node-C  path:[C]</text>
  <text x="72" y="397" fill="#94a3b8" font-size="9">search-api    via Node-B  path:[D,B]</text>
  <text x="72" y="413" fill="#6b7280" font-size="8" font-style="italic">envoyAddress rewritten → Node-A addr</text>

  <!-- A: Services -->
  <rect x="50" y="450" width="270" height="55" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="185" y="472" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Local Services</text>
  <text x="70" y="492" fill="#60a5fa" font-size="9">users-api  |  payments-api</text>

  <!-- A: Journal -->
  <rect x="50" y="515" width="125" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="112" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">SQLite Journal</text>
  <text x="112" y="548" text-anchor="middle" fill="#475569" font-size="7">Snapshot + Replay</text>

  <!-- A: PortAlloc -->
  <rect x="185" y="515" width="135" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="252" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PortAllocator</text>
  <text x="252" y="548" text-anchor="middle" fill="#475569" font-size="7">:8081 :8082 :9001...</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND B (Center)                               -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="395" y="90" width="310" height="520" rx="18" fill="url(#islandB)" stroke="#8b5cf6" stroke-width="2.5" filter="url(#sh2)"/>
  <rect x="403" y="98" width="294" height="504" rx="14" fill="none" stroke="#3b1a5f" stroke-width="1" stroke-dasharray="3,5"/>

  <rect x="410" y="105" width="130" height="30" rx="6" fill="#1a0c29" stroke="#6d28d9" stroke-width="1"/>
  <text x="420" y="125" fill="#8b5cf6" font-size="12" font-weight="800">NODE B</text>

  <!-- B: OrchestratorBus -->
  <rect x="415" y="150" width="270" height="55" rx="10" fill="#1e1045" stroke="#7c3aed" stroke-width="1"/>
  <text x="550" y="173" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">OrchestratorBus</text>
  <text x="550" y="193" text-anchor="middle" fill="#8b5cf6" font-size="9">Plan → Commit → Notify</text>

  <!-- B: RIB -->
  <rect x="415" y="220" width="270" height="220" rx="10" fill="#0a0f1a" stroke="#4c1d95" stroke-width="1"/>
  <text x="550" y="244" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">Route Table (RIB)</text>

  <!-- B: LOCAL -->
  <rect x="427" y="258" width="246" height="50" rx="6" fill="#1e3a8a" opacity="0.4" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="437" y="275" fill="#93c5fd" font-size="10" font-weight="700">LOCAL</text>
  <text x="437" y="293" fill="#94a3b8" font-size="9">orders-api    http:graphql  :8081</text>

  <!-- B: INTERNAL -->
  <rect x="427" y="316" width="246" height="114" rx="6" fill="#052e16" opacity="0.4" stroke="#22c55e" stroke-width="0.5"/>
  <text x="437" y="333" fill="#6ee7b7" font-size="10" font-weight="700">INTERNAL (learned via iBGP)</text>
  <text x="437" y="351" fill="#94a3b8" font-size="9">users-api     via Node-A  path:[A]</text>
  <text x="437" y="367" fill="#94a3b8" font-size="9">payments-api  via Node-A  path:[A]</text>
  <text x="437" y="383" fill="#94a3b8" font-size="9">billing-svc   via Node-C  path:[C]</text>
  <text x="437" y="399" fill="#94a3b8" font-size="9">search-api    via Node-D  path:[D]</text>
  <text x="437" y="415" fill="#6b7280" font-size="8" font-style="italic">envoyAddress rewritten → Node-B addr</text>

  <!-- B: Services -->
  <rect x="415" y="450" width="270" height="55" rx="8" fill="#0f172a" stroke="#3b1a5f" stroke-width="1"/>
  <text x="550" y="472" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Local Services</text>
  <text x="435" y="492" fill="#a78bfa" font-size="9">orders-api</text>

  <!-- B: Journal + PortAlloc -->
  <rect x="415" y="515" width="125" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="477" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">SQLite Journal</text>
  <rect x="550" y="515" width="135" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="617" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PortAllocator</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND C (Right)                                -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="760" y="90" width="310" height="520" rx="18" fill="url(#islandC)" stroke="#22c55e" stroke-width="2.5" filter="url(#sh2)"/>
  <rect x="768" y="98" width="294" height="504" rx="14" fill="none" stroke="#1a3b2a" stroke-width="1" stroke-dasharray="3,5"/>

  <rect x="775" y="105" width="130" height="30" rx="6" fill="#0c2920" stroke="#16a34a" stroke-width="1"/>
  <text x="785" y="125" fill="#22c55e" font-size="12" font-weight="800">NODE C</text>

  <!-- C: OrchestratorBus -->
  <rect x="780" y="150" width="270" height="55" rx="10" fill="#1e1045" stroke="#7c3aed" stroke-width="1"/>
  <text x="915" y="173" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">OrchestratorBus</text>
  <text x="915" y="193" text-anchor="middle" fill="#8b5cf6" font-size="9">Plan → Commit → Notify</text>

  <!-- C: RIB -->
  <rect x="780" y="220" width="270" height="220" rx="10" fill="#0a0f1a" stroke="#4c1d95" stroke-width="1"/>
  <text x="915" y="244" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">Route Table (RIB)</text>

  <rect x="792" y="258" width="246" height="50" rx="6" fill="#1e3a8a" opacity="0.4" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="802" y="275" fill="#93c5fd" font-size="10" font-weight="700">LOCAL</text>
  <text x="802" y="293" fill="#94a3b8" font-size="9">billing-svc   http:grpc    :8081</text>

  <rect x="792" y="316" width="246" height="114" rx="6" fill="#052e16" opacity="0.4" stroke="#22c55e" stroke-width="0.5"/>
  <text x="802" y="333" fill="#6ee7b7" font-size="10" font-weight="700">INTERNAL (learned via iBGP)</text>
  <text x="802" y="351" fill="#94a3b8" font-size="9">users-api     via Node-A  path:[A]</text>
  <text x="802" y="367" fill="#94a3b8" font-size="9">payments-api  via Node-A  path:[A]</text>
  <text x="802" y="383" fill="#94a3b8" font-size="9">orders-api    via Node-B  path:[B]</text>
  <text x="802" y="399" fill="#94a3b8" font-size="9">search-api    via Node-B  path:[D,B]</text>
  <text x="802" y="415" fill="#6b7280" font-size="8" font-style="italic">envoyAddress rewritten → Node-C addr</text>

  <rect x="780" y="450" width="270" height="55" rx="8" fill="#0f172a" stroke="#1a3b2a" stroke-width="1"/>
  <text x="915" y="472" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Local Services</text>
  <text x="800" y="492" fill="#34d399" font-size="9">billing-svc</text>

  <rect x="780" y="515" width="125" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="842" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">SQLite Journal</text>
  <rect x="915" y="515" width="135" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="982" y="535" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">PortAllocator</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- iBGP CONNECTIONS                                -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- A <-> B -->
  <line x1="340" y1="178" x2="395" y2="178" stroke="#38bdf8" stroke-width="3" filter="url(#sh2)"/>
  <rect x="348" y="162" width="40" height="16" rx="4" fill="#0c4a6e"/>
  <text x="368" y="174" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- B <-> C -->
  <line x1="705" y1="178" x2="760" y2="178" stroke="#38bdf8" stroke-width="3" filter="url(#sh2)"/>
  <rect x="713" y="162" width="40" height="16" rx="4" fill="#0c4a6e"/>
  <text x="733" y="174" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- A <-> C (curved bottom) -->
  <path d="M185,610 Q550,680 915,610" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="530" y="660" width="40" height="16" rx="4" fill="#0c4a6e"/>
  <text x="550" y="672" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- MULTI-HOP EXAMPLE                               -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="700" width="1040" height="105" rx="12" fill="#0a0f1a" stroke="#1e293b" stroke-width="1"/>

  <text x="55" y="725" fill="#e2e8f0" font-size="13" font-weight="700">Multi-Hop Route Propagation Example</text>
  <text x="55" y="745" fill="#94a3b8" font-size="10">Node D has search-api locally. D peers with B. B peers with A and C. Watch the nodePath grow:</text>

  <!-- D -> B -> A/C flow -->
  <rect x="70" y="758" width="80" height="30" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="778" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Node D</text>
  <text x="110" y="798" text-anchor="middle" fill="#92400e" font-size="8">origin: search-api</text>

  <line x1="150" y1="773" x2="220" y2="773" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr2Blue)"/>
  <text x="185" y="766" text-anchor="middle" fill="#fbbf24" font-size="8">UPDATE add</text>

  <rect x="230" y="758" width="180" height="30" rx="6" fill="#1a0c29" stroke="#8b5cf6" stroke-width="1"/>
  <text x="320" y="778" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Node B receives</text>
  <text x="320" y="798" text-anchor="middle" fill="#6d28d9" font-size="8">search-api path:[D] origin:D</text>

  <line x1="410" y1="773" x2="480" y2="763" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr2Blue)"/>
  <line x1="410" y1="773" x2="480" y2="783" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr2Green)"/>
  <text x="445" y="755" fill="#a78bfa" font-size="8">re-advertise</text>

  <rect x="490" y="748" width="220" height="25" rx="6" fill="#0c1929" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="765" text-anchor="middle" fill="#93c5fd" font-size="9">Node A: search-api path:[D,B] envoy→B</text>

  <rect x="490" y="778" width="220" height="25" rx="6" fill="#0c2920" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="795" text-anchor="middle" fill="#6ee7b7" font-size="9">Node C: search-api path:[D,B] envoy→B</text>

  <!-- Loop guard note -->
  <rect x="740" y="755" width="310" height="42" rx="6" fill="#1c1917" stroke="#78350f" stroke-width="1"/>
  <text x="755" y="772" fill="#fbbf24" font-size="10" font-weight="600">Loop Guard: if nodePath.includes(myId) → DISCARD</text>
  <text x="755" y="788" fill="#92400e" font-size="9">Best-path: prefer shorter nodePath. Max 64 hops.</text>
</svg>
