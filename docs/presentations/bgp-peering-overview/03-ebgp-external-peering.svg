<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="isA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1929;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#061018;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="isB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0c29;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#100618;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="isC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2920;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#061812;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="isD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#291c0c;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#18100a;stop-opacity:0.95"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="waterGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a3Blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="a3Cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background (the "ocean" between islands) -->
  <rect width="1100" height="780" fill="url(#bg3)"/>

  <!-- Water pattern to emphasize separation -->
  <circle cx="350" cy="400" r="400" fill="url(#seaGrad)" opacity="0.3"/>
  <circle cx="750" cy="350" r="350" fill="url(#seaGrad)" opacity="0.2"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">Catalyst Network — Islands in the Ocean</text>
  <text x="550" y="60" text-anchor="middle" fill="#64748b" font-size="12">Each island is fully autonomous. Peer connections are the only bridges. No island depends on another to operate.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND A — Top Left                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="40" y="90" width="280" height="310" rx="20" fill="url(#isA)" stroke="#3b82f6" stroke-width="3" filter="url(#sh3)"/>
  <rect x="48" y="98" width="264" height="294" rx="16" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,5"/>

  <text x="65" y="125" fill="#3b82f6" font-size="14" font-weight="800">NODE A</text>
  <text x="65" y="142" fill="#1e3a5f" font-size="9">Autonomous Island</text>

  <!-- A: Components stack -->
  <rect x="58" y="155" width="244" height="32" rx="6" fill="#1e1045" stroke="#6d28d9" stroke-width="0.5"/>
  <text x="180" y="176" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">OrchestratorBus + RIB</text>

  <rect x="58" y="195" width="244" height="55" rx="6" fill="#0a0f1a" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="68" y="212" fill="#93c5fd" font-size="9" font-weight="600">LOCAL</text>
  <text x="68" y="228" fill="#94a3b8" font-size="8">users-api      :8081</text>
  <text x="68" y="242" fill="#94a3b8" font-size="8">payments-api   :8082</text>

  <rect x="58" y="258" width="244" height="75" rx="6" fill="#0a0f1a" stroke="#052e16" stroke-width="0.5"/>
  <text x="68" y="275" fill="#6ee7b7" font-size="9" font-weight="600">INTERNAL</text>
  <text x="68" y="291" fill="#94a3b8" font-size="8">orders-api    via B  [B]</text>
  <text x="68" y="305" fill="#94a3b8" font-size="8">billing-svc   via C  [C]</text>
  <text x="68" y="319" fill="#94a3b8" font-size="8">search-api    via B  [D,B]</text>

  <!-- A: Infra -->
  <rect x="58" y="340" width="115" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="115" y="355" text-anchor="middle" fill="#475569" font-size="7">Journal + Recovery</text>
  <rect x="180" y="340" width="122" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="241" y="355" text-anchor="middle" fill="#475569" font-size="7">Ports + GW + Auth</text>

  <!-- A: Graceful restart indicator -->
  <rect x="58" y="370" width="244" height="18" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="0.5"/>
  <text x="180" y="383" text-anchor="middle" fill="#92400e" font-size="7">Graceful Restart: stale routes preserved on transport error</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND B — Top Right                            -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="530" y="90" width="280" height="310" rx="20" fill="url(#isB)" stroke="#8b5cf6" stroke-width="3" filter="url(#sh3)"/>
  <rect x="538" y="98" width="264" height="294" rx="16" fill="none" stroke="#3b1a5f" stroke-width="1" stroke-dasharray="3,5"/>

  <text x="555" y="125" fill="#8b5cf6" font-size="14" font-weight="800">NODE B</text>
  <text x="555" y="142" fill="#3b1a5f" font-size="9">Autonomous Island</text>

  <rect x="548" y="155" width="244" height="32" rx="6" fill="#1e1045" stroke="#6d28d9" stroke-width="0.5"/>
  <text x="670" y="176" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">OrchestratorBus + RIB</text>

  <rect x="548" y="195" width="244" height="42" rx="6" fill="#0a0f1a" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="558" y="212" fill="#93c5fd" font-size="9" font-weight="600">LOCAL</text>
  <text x="558" y="228" fill="#94a3b8" font-size="8">orders-api     :8081</text>

  <rect x="548" y="245" width="244" height="88" rx="6" fill="#0a0f1a" stroke="#052e16" stroke-width="0.5"/>
  <text x="558" y="262" fill="#6ee7b7" font-size="9" font-weight="600">INTERNAL</text>
  <text x="558" y="278" fill="#94a3b8" font-size="8">users-api     via A  [A]</text>
  <text x="558" y="292" fill="#94a3b8" font-size="8">payments-api  via A  [A]</text>
  <text x="558" y="306" fill="#94a3b8" font-size="8">billing-svc   via C  [C]</text>
  <text x="558" y="320" fill="#94a3b8" font-size="8">search-api    via D  [D]</text>

  <rect x="548" y="340" width="115" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="605" y="355" text-anchor="middle" fill="#475569" font-size="7">Journal + Recovery</text>
  <rect x="670" y="340" width="122" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="731" y="355" text-anchor="middle" fill="#475569" font-size="7">Ports + GW + Auth</text>

  <rect x="548" y="370" width="244" height="18" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="0.5"/>
  <text x="670" y="383" text-anchor="middle" fill="#92400e" font-size="7">Graceful Restart: stale routes preserved on transport error</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND C — Bottom Left                          -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="450" width="280" height="280" rx="20" fill="url(#isC)" stroke="#22c55e" stroke-width="3" filter="url(#sh3)"/>
  <rect x="148" y="458" width="264" height="264" rx="16" fill="none" stroke="#1a3b2a" stroke-width="1" stroke-dasharray="3,5"/>

  <text x="165" y="485" fill="#22c55e" font-size="14" font-weight="800">NODE C</text>
  <text x="165" y="502" fill="#1a3b2a" font-size="9">Autonomous Island</text>

  <rect x="158" y="515" width="244" height="32" rx="6" fill="#1e1045" stroke="#6d28d9" stroke-width="0.5"/>
  <text x="280" y="536" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">OrchestratorBus + RIB</text>

  <rect x="158" y="555" width="244" height="42" rx="6" fill="#0a0f1a" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="168" y="572" fill="#93c5fd" font-size="9" font-weight="600">LOCAL</text>
  <text x="168" y="588" fill="#94a3b8" font-size="8">billing-svc    :8081</text>

  <rect x="158" y="605" width="244" height="75" rx="6" fill="#0a0f1a" stroke="#052e16" stroke-width="0.5"/>
  <text x="168" y="622" fill="#6ee7b7" font-size="9" font-weight="600">INTERNAL</text>
  <text x="168" y="638" fill="#94a3b8" font-size="8">users-api     via A  [A]</text>
  <text x="168" y="652" fill="#94a3b8" font-size="8">payments-api  via A  [A]</text>
  <text x="168" y="666" fill="#94a3b8" font-size="8">orders-api    via B  [B]</text>

  <rect x="158" y="688" width="244" height="18" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="0.5"/>
  <text x="280" y="701" text-anchor="middle" fill="#92400e" font-size="7">Graceful Restart: stale routes preserved on transport error</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ISLAND D — Bottom Right                         -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="640" y="450" width="280" height="280" rx="20" fill="url(#isD)" stroke="#f59e0b" stroke-width="3" filter="url(#sh3)"/>
  <rect x="648" y="458" width="264" height="264" rx="16" fill="none" stroke="#78350f" stroke-width="1" stroke-dasharray="3,5"/>

  <text x="665" y="485" fill="#f59e0b" font-size="14" font-weight="800">NODE D</text>
  <text x="665" y="502" fill="#78350f" font-size="9">Autonomous Island — Edge</text>

  <rect x="658" y="515" width="244" height="32" rx="6" fill="#1e1045" stroke="#6d28d9" stroke-width="0.5"/>
  <text x="780" y="536" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">OrchestratorBus + RIB</text>

  <rect x="658" y="555" width="244" height="42" rx="6" fill="#0a0f1a" stroke="#1e3a8a" stroke-width="0.5"/>
  <text x="668" y="572" fill="#93c5fd" font-size="9" font-weight="600">LOCAL</text>
  <text x="668" y="588" fill="#94a3b8" font-size="8">search-api     :8081</text>

  <rect x="658" y="605" width="244" height="55" rx="6" fill="#0a0f1a" stroke="#052e16" stroke-width="0.5"/>
  <text x="668" y="622" fill="#6ee7b7" font-size="9" font-weight="600">INTERNAL</text>
  <text x="668" y="638" fill="#94a3b8" font-size="8">orders-api    via B  [B]</text>
  <text x="668" y="652" fill="#6b7280" font-size="7" font-style="italic">Single peer — partial view of network</text>

  <rect x="658" y="668" width="244" height="18" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="0.5"/>
  <text x="780" y="681" text-anchor="middle" fill="#92400e" font-size="7">Only sees what Node B re-advertises</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- iBGP CONNECTIONS (bridges between islands)      -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- A <-> B -->
  <path d="M320,250 C400,230 460,230 530,250" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#sh3)"/>
  <rect x="400" y="220" width="50" height="18" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="425" y="233" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- A <-> C -->
  <path d="M180,400 C160,420 160,440 200,450" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#sh3)"/>
  <rect x="135" y="420" width="50" height="18" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="160" y="433" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- B <-> C -->
  <path d="M600,400 C560,420 480,440 420,470" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#sh3)"/>
  <rect x="490" y="425" width="50" height="18" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="515" y="438" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- B <-> D -->
  <path d="M750,400 C770,420 770,440 760,450" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#sh3)"/>
  <rect x="762" y="415" width="50" height="18" rx="4" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="787" y="428" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">iBGP</text>

  <!-- Note: D only connects to B (edge node) -->
  <text x="870" y="500" fill="#78350f" font-size="9" font-style="italic">D is an edge island</text>
  <text x="870" y="514" fill="#78350f" font-size="9" font-style="italic">— single bridge to B</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- KEY PROPERTIES                                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="850" y="90" width="220" height="230" rx="12" fill="#0a0f1a" stroke="#1e293b" stroke-width="1"/>
  <text x="960" y="115" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Island Properties</text>
  <line x1="865" y1="124" x2="1055" y2="124" stroke="#1e293b" stroke-width="0.5"/>

  <circle cx="873" cy="143" r="3" fill="#22c55e"/>
  <text x="883" y="147" fill="#94a3b8" font-size="9">Self-sovereign state (own RIB)</text>

  <circle cx="873" cy="163" r="3" fill="#22c55e"/>
  <text x="883" y="167" fill="#94a3b8" font-size="9">Persistent journal (SQLite)</text>

  <circle cx="873" cy="183" r="3" fill="#22c55e"/>
  <text x="883" y="187" fill="#94a3b8" font-size="9">Crash recovery from journal</text>

  <circle cx="873" cy="203" r="3" fill="#22c55e"/>
  <text x="883" y="207" fill="#94a3b8" font-size="9">Graceful restart (stale routes)</text>

  <circle cx="873" cy="223" r="3" fill="#22c55e"/>
  <text x="883" y="227" fill="#94a3b8" font-size="9">Loop detection (nodePath)</text>

  <circle cx="873" cy="243" r="3" fill="#22c55e"/>
  <text x="883" y="247" fill="#94a3b8" font-size="9">Best-path selection (shortest)</text>

  <circle cx="873" cy="263" r="3" fill="#22c55e"/>
  <text x="883" y="267" fill="#94a3b8" font-size="9">Own port allocation</text>

  <circle cx="873" cy="283" r="3" fill="#f87171"/>
  <text x="883" y="287" fill="#94a3b8" font-size="9">No central authority</text>

  <circle cx="873" cy="303" r="3" fill="#f87171"/>
  <text x="883" y="307" fill="#94a3b8" font-size="9">No distributed consensus</text>

  <!-- V2 callout -->
  <rect x="850" y="330" width="220" height="35" rx="6" fill="#1c1917" stroke="#78350f" stroke-width="1"/>
  <text x="960" y="348" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">V2: LOCAL + INTERNAL only</text>
  <text x="960" y="362" text-anchor="middle" fill="#92400e" font-size="8">External routes removed from design</text>
</svg>
