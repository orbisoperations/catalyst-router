# Health check extension for Docker healthcheck probes
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

# Ingestion endpoints for telemetry data from Catalyst services
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# Middleware between receivers and exporters.
# Order matters in pipeline definitions: memory_limiter runs first to shed
# load before data reaches the batcher, preventing OOM under spikes.
processors:
  # Buffers telemetry and flushes in batches to reduce exporter overhead
  batch:
  # Drops data when collector memory exceeds limit to prevent OOM
  memory_limiter:
    check_interval: 5s
    limit_mib: 256

# Output destinations for telemetry data
exporters:
  debug:
    verbosity: detailed
  otlphttp/jaeger:
    endpoint: http://jaeger:4318
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

# All three signal types use the same receiver -> processor -> exporter chain
service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/loki]
