# Observability backends — opt-in overlay
# Usage: docker compose -f docker.compose.yaml -f observability.compose.yaml up
services:
  otel-collector:
    command:
      - '--config'
      - '/etc/otel-collector-config.yaml'
      - '--config'
      - '/etc/otel-collector-observability.yaml'
    volumes:
      - ./otel-collector-observability.yaml:/etc/otel-collector-observability.yaml

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    ports:
      - '16686:16686'
    depends_on:
      otel-collector:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    ports:
      - '3100:3100'
    command: ['-config.file=/etc/loki/loki.yaml']
    volumes:
      - ./loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana-oss:11.5.2
    ports:
      - '3050:3000'
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_VIEWERS_CAN_EDIT=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
      loki:
        condition: service_started

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
