services:
  # --- Observability stack ---

  otel-collector:
    build:
      context: .
      dockerfile_inline: |
        FROM otel/opentelemetry-collector-contrib:0.144.0
        COPY --from=busybox:1.37-musl /bin/wget /usr/bin/wget
    container_name: catalyst-otel-collector
    command: ['--config', '/etc/otel-collector-config.yaml']
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:13133']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Catalyst services ---

  auth:
    build:
      context: ..
      dockerfile: apps/auth/Dockerfile
    ports:
      - '4020:4020'
    environment:
      - PORT=4020
      - CATALYST_NODE_ID=auth.dev.catalyst.local
      - CATALYST_DOMAINS=dev.catalyst.local
      - CATALYST_AUTH_KEYS_DB=/data/keys.db
      - CATALYST_AUTH_TOKENS_DB=/data/tokens.db
      - OTEL_SERVICE_NAME=auth
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    volumes:
      - auth-data:/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4020/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_healthy

  orchestrator:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - CATALYST_NODE_ID=node-a.somebiz.local.io
      - CATALYST_PEERING_ENDPOINT=ws://orchestrator:3000/rpc
      - CATALYST_DOMAINS=somebiz.local.io
      - CATALYST_PEERING_SECRET=valid-secret
      - CATALYST_GQL_GATEWAY_ENDPOINT=ws://gateway:4000/api
      - CATALYST_ENVOY_ENDPOINT=ws://envoy-service:3000/api
      - CATALYST_ENVOY_PORT_RANGE=[10000, [10001, 10100]]
      - OTEL_SERVICE_NAME=orchestrator
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - CATALYST_DASHBOARD_LINKS_FILE=/app/config/dashboard-links.json
    volumes:
      - ./dashboard-links.json:/app/config/dashboard-links.json:ro
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      auth:
        condition: service_healthy
      gateway:
        condition: service_healthy
      envoy-service:
        condition: service_healthy

  web-ui:
    build:
      context: ..
      dockerfile: apps/web-ui/Dockerfile
    ports:
      - '8080:3000'
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:3000
      - ENVOY_URL=http://envoy-service:3000
      - AUTH_URL=http://auth:4020
      - GATEWAY_URL=http://gateway:4000
      - OTEL_SERVICE_NAME=orchestrator
      - CATALYST_DASHBOARD_LINKS_FILE=/app/config/dashboard-links.json
    volumes:
      - ./dashboard-links.json:/app/config/dashboard-links.json:ro
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      orchestrator:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - CATALYST_NODE_ID=gateway.dev.catalyst.local
      - CATALYST_DOMAINS=dev.catalyst.local
      - OTEL_SERVICE_NAME=gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_healthy
      books-service:
        condition: service_healthy
      movies-service:
        condition: service_healthy

  books-service:
    build:
      context: ..
      dockerfile: examples/books-api/Dockerfile
    ports:
      - '8081:8080'
    environment:
      - PORT=8080
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 10s
      timeout: 5s
      retries: 5

  movies-service:
    build:
      context: ..
      dockerfile: examples/movies-api/Dockerfile
    ports:
      - '8082:8080'
    environment:
      - PORT=8080
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Envoy data plane ---

  envoy-service:
    build:
      context: ..
      dockerfile: apps/envoy/Dockerfile
    ports:
      - '3010:3000'
      - '18000:18000'
    environment:
      - PORT=3000
      - CATALYST_NODE_ID=envoy-service
      - CATALYST_ENVOY_XDS_PORT=18000
      - CATALYST_ENVOY_BIND_ADDRESS=0.0.0.0
      - OTEL_SERVICE_NAME=envoy-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_healthy

  envoy-proxy:
    image: envoyproxy/envoy:v1.32-latest
    ports:
      - '10000:10000'
      - '9901:9901'
    volumes:
      - ./envoy-bootstrap.yaml:/etc/envoy/envoy.yaml:ro
    command: ['-c', '/etc/envoy/envoy.yaml', '--log-level', 'info']
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:9901/server_info',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      envoy-service:
        condition: service_healthy

volumes:
  auth-data:
