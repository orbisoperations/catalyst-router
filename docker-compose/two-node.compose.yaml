services:
  # --- Observability stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.144.0
    container_name: catalyst-otel-collector-2n
    command: ['--config', '/etc/otel-collector-config.yaml']
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    healthcheck:
      disable: true
    restart: unless-stopped

  # --- Shared auth ---

  auth:
    build:
      context: ..
      dockerfile: apps/auth/Dockerfile
    ports:
      - '4020:4020'
    environment:
      - PORT=4020
      - CATALYST_NODE_ID=auth.dev.catalyst.local
      - CATALYST_AUTH_KEYS_DB=/data/keys.db
      - CATALYST_AUTH_TOKENS_DB=/data/tokens.db
      - OTEL_SERVICE_NAME=auth
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    volumes:
      - auth-data:/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4020/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_started

  # --- Node A: gateway-a + books ---

  gateway-a:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - CATALYST_NODE_ID=gateway-a.dev.catalyst.local
      - OTEL_SERVICE_NAME=gateway-a
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_started
      books-service:
        condition: service_healthy

  books-service:
    build:
      context: ..
      dockerfile: examples/books-api/Dockerfile
    ports:
      - '8081:8080'
    environment:
      - PORT=8080
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 10s
      timeout: 5s
      retries: 5

  node-a:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - '3001:3000'
    environment:
      - PORT=3000
      - CATALYST_NODE_ID=node-a.dev.catalyst.local
      - CATALYST_PEERING_ENDPOINT=ws://node-a:3000/rpc
      - CATALYST_DOMAINS=dev.catalyst.local
      - CATALYST_PEERING_SECRET=valid-secret
      - CATALYST_GQL_GATEWAY_ENDPOINT=ws://gateway-a:4000/api
      - CATALYST_ENVOY_ENDPOINT=ws://envoy-service:3000/api
      - CATALYST_ENVOY_PORT_RANGE=[10000, [10001, 10050]]
      - OTEL_SERVICE_NAME=orchestrator-node-a
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - >-
        CATALYST_DASHBOARD_LINKS={"metrics":"http://localhost:3050/d/catalyst-services?var-service={service}","traces":"http://localhost:3050/explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22jaeger%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22queryType%22%3A%22search%22%2C%22service%22%3A%22{service}%22%7D%5D%7D%7D","logs":"http://localhost:3050/explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bservice_name%3D%5C%22{service}%5C%22%7D%22%7D%5D%7D%7D"}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - node-a
    depends_on:
      auth:
        condition: service_healthy
      gateway-a:
        condition: service_healthy
      envoy-service:
        condition: service_healthy

  # --- Node B: gateway-b + movies ---

  gateway-b:
    build:
      context: ..
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '4001:4000'
    environment:
      - PORT=4000
      - CATALYST_NODE_ID=gateway-b.dev.catalyst.local
      - OTEL_SERVICE_NAME=gateway-b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_started
      movies-service:
        condition: service_healthy

  movies-service:
    build:
      context: ..
      dockerfile: examples/movies-api/Dockerfile
    ports:
      - '8082:8080'
    environment:
      - PORT=8080
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 10s
      timeout: 5s
      retries: 5

  node-b:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - '3002:3000'
    environment:
      - PORT=3000
      - CATALYST_NODE_ID=node-b.dev.catalyst.local
      - CATALYST_PEERING_ENDPOINT=ws://node-b:3000/rpc
      - CATALYST_DOMAINS=dev.catalyst.local
      - CATALYST_PEERING_SECRET=valid-secret
      - CATALYST_GQL_GATEWAY_ENDPOINT=ws://gateway-b:4000/api
      - CATALYST_ENVOY_ENDPOINT=ws://envoy-service:3000/api
      - CATALYST_ENVOY_PORT_RANGE=[[10051, 10100]]
      - OTEL_SERVICE_NAME=orchestrator-node-b
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - >-
        CATALYST_DASHBOARD_LINKS={"metrics":"http://localhost:3050/d/catalyst-services?var-service={service}","traces":"http://localhost:3050/explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22jaeger%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22queryType%22%3A%22search%22%2C%22service%22%3A%22{service}%22%7D%5D%7D%7D","logs":"http://localhost:3050/explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bservice_name%3D%5C%22{service}%5C%22%7D%22%7D%5D%7D%7D"}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - node-b
    depends_on:
      auth:
        condition: service_healthy
      gateway-b:
        condition: service_healthy
      envoy-service:
        condition: service_healthy

  web-ui:
    build:
      context: ..
      dockerfile: apps/web-ui/Dockerfile
    ports:
      - '8080:3000'
    environment:
      - ORCHESTRATOR_URL=http://node-a:3000
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      node-a:
        condition: service_healthy

  # --- Envoy data plane ---

  envoy-service:
    build:
      context: ..
      dockerfile: apps/envoy/Dockerfile
    ports:
      - '3010:3000'
      - '18000:18000'
    environment:
      - PORT=3000
      - CATALYST_NODE_ID=envoy-service
      - CATALYST_ENVOY_XDS_PORT=18000
      - CATALYST_ENVOY_BIND_ADDRESS=0.0.0.0
      - OTEL_SERVICE_NAME=envoy-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      otel-collector:
        condition: service_started

  envoy-proxy:
    image: envoyproxy/envoy:v1.32-latest
    ports:
      - '10000:10000'
      - '9901:9901'
    volumes:
      - ./envoy-bootstrap.yaml:/etc/envoy/envoy.yaml:ro
    command: ['-c', '/etc/envoy/envoy.yaml', '--log-level', 'info']
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:9901/server_info',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      envoy-service:
        condition: service_healthy

  # --- Observability backends ---

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    ports:
      - '16686:16686'
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    depends_on:
      otel-collector:
        condition: service_started

  loki:
    image: grafana/loki:3.4.2
    ports:
      - '3100:3100'
    command: ['-config.file=/etc/loki/loki.yaml']
    volumes:
      - ./loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana-oss:11.5.2
    ports:
      - '3050:3000'
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_VIEWERS_CAN_EDIT=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
      loki:
        condition: service_started

volumes:
  auth-data:
  prometheus-data:
  loki-data:
  grafana-data:
